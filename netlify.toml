# ─── Netlify Configuration ───────────────────────────────────────────────────
# App puramente estática — sin build step, publicación directa desde raíz.

[build]
  publish = "."

# ─── Headers globales ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# El SW debe servirse sin caché para que las actualizaciones lleguen al instante
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# manifest.json: caché corta para que el nombre/icono se actualice pronto
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Imágenes: caché larga
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: sin caché (así Arancha siempre recibe la última versión)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ─── Redirects ────────────────────────────────────────────────────────────────
# SPA fallback: cualquier ruta desconocida → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
